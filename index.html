and to pick up food and drink water.","An elephant's ears are huge. Why? Flapping them like fans helps the elephant stay cool."]},{e:"\u{1F410}",name:"Goat",art:"goat",layers:["This is a goat. The goat says maa!","Many families keep goats. Goats give us milk and eat grass and leaves.","Goats can climb steep rocks and hills. Why might strong, hard hooves help them do that?"]},{e:"\u{1F98E}",name:"Gecko",art:"gecko",layers:["This is a gecko. It is a little lizard.","A gecko can walk up walls and even across the ceiling without falling.","Geckos eat insects like mosquitoes. Why is a gecko on your wall a helpful friend at night?"]},{e:"\u{1F99C}",name:"Parrot",art:"parrot",layers:["This is a parrot. It has bright feathers.","The grey parrot is very clever and can copy words and sounds it hears.","Parrots use strong curved beaks to crack hard nuts. What other jobs could that beak do?"]},{e:"\u{1F41F}",name:"Fish",art:"fish",layers:["This is a fish. It swims in the water.","Fish breathe underwater using gills, and they swish their tails to swim.","Fish have fins all over. Why do you think different fins help a fish turn, stop, and go?"]}]},body:{name:"My Body",icon:"\u{1F9D2}\u{1F3FE}",color:"#6C4AB6",topics:[{e:"\u{1F440}",name:"Eyes",layers:["These are your eyes. You see with them.","Your two eyes work together so you can tell what is near and what is far.","Why do we blink? Blinking keeps your eyes clean and wet, like tiny windscreen wipers."]},{e:"\u{1F442}",name:"Ears",layers:["These are your ears. You hear with them.","Your ears catch sounds from all around, even behind you.","Why do you have an ear on each side of your head? It helps you tell where a sound comes from."]},{e:"\u270B",name:"Hands",layers:["These are your hands. You hold things with them.","Your thumb can touch every finger, which lets you grip and pick up tiny things.","Why are hands so useful? Think of all the things only hands can do \u2014 clap, write, button a shirt."]},{e:"\u{1F9B7}",name:"Teeth",layers:["These are your teeth. You chew food with them.","Front teeth bite and back teeth grind your food into tiny bits.","Why should we brush our teeth every day? To wash away sugar so teeth stay strong."]},{e:"\u2764\uFE0F",name:"Heart",layers:["This is your heart. It goes thump thump.","Your heart pumps blood all around your body, day and night.","When you run fast your heart beats quicker. Why do you think it speeds up?"]}]},nature:{name:"Nature",icon:"\u{1F333}",color:"#3FA34D",topics:[{e:"\u2600\uFE0F",name:"Sun",art:"sun",layers:["This is the sun. It is bright and warm.","The sun gives us light in the daytime and helps plants grow.","Why is it dark at night? The earth turns, so our side faces away from the sun."]},{e:"\u{1F327}\uFE0F",name:"Rain",art:"rain",layers:["This is rain. It makes you wet!","In the rainy season, rain fills the rivers and helps the crops grow.","Where does rain come from? Water rises into clouds, then falls back down as drops."]},{e:"\u{1F33D}",name:"Maize",layers:["This is maize. We can eat it.","Maize grows tall in the garden from a tiny seed planted in the soil.","A seed needs sun, water, and soil to grow. Which one do you think it needs most?"]},{e:"\u{1F333}",name:"Tree",art:"tree",layers:["This is a tree. It is tall.","Trees give us shade, fruit, and clean air to breathe.","Why are trees important for us and for animals? Think of who lives in a tree."]},{e:"\u{1F41D}",name:"Bee",layers:["This is a bee. It says buzz!","Bees fly from flower to flower and make sweet honey.","Bees help flowers and fruit grow. Why might a garden need bees to visit it?"]}]},space:{name:"Space",icon:"\u{1F319}",color:"#3a4a8c",topics:[{e:"\u{1F319}",name:"Moon",art:"moon",layers:["This is the moon. We see it at night.","The moon is far away in the sky and changes shape through the month.","The moon has no light of its own. So why does it shine? It reflects the sun's light."]},{e:"\u2B50",name:"Stars",layers:["These are stars. They twinkle.","Stars ar
