<script>
/* ============================================================================
   Little Learners — Enhancements module
   - Robust narration on Android (Capacitor Text-to-Speech native plugin) with
     web speechSynthesis fallback.
   - Microphone + speech recognition helpers.
   - "Read with Me" section (blending / joining words) — for Kanaan.
   - "Classroom" section — AI teacher powered by Groq (parent-entered key).
   All state persists on-device via localStorage. Nothing else is sent anywhere
   except the Groq request the parent explicitly enables with their own key.
   ============================================================================ */
(function () {
  "use strict";

  /* ---------- shared design tokens (mirror the main app) ---------- */
  var y = { sky:"#FFE8B8", sky2:"#FFD27A", leaf:"#3FA34D", leafDark:"#2C7A3A",
            clay:"#E8743B", clayDark:"#C75A28", berry:"#6C4AB6", cream:"#FFF7E8",
            ink:"#3A2A1A", good:"#3FA34D", soft:"#FFFBF2" };
  var FONT = "'Baloo 2','Quicksand','Trebuchet MS',system-ui,sans-serif";
  var a = {
    card:{ background:y.soft, borderRadius:32, padding:24,
           boxShadow:"0 10px 30px rgba(0,0,0,0.12)", width:"100%",
           maxWidth:560, boxSizing:"border-box" },
    bigBtn:{ border:"none", borderRadius:28, padding:"22px 26px", fontSize:24,
             fontFamily:FONT, fontWeight:800, cursor:"pointer", color:"white",
             boxShadow:"0 6px 0 rgba(0,0,0,0.15)", transition:"transform .08s", margin:8 },
    title:{ fontSize:34, fontWeight:800, margin:"8px 0 18px", textAlign:"center" }
  };

  /* ========================================================================
     1) NATIVE / WEB SPEECH BRIDGE
     ======================================================================== */
  var Cap = function () { return window.Capacitor || null; };
  var isNative = function () { var c = Cap(); return !!(c && c.isNativePlatform && c.isNativePlatform()); };
  function nativePlugin(name) {
    var c = Cap();
    if (c && c.Plugins && c.Plugins[name]) return c.Plugins[name];
    if (window[name]) return window[name];
    return null;
  }

  // Preferred web voice picker (kept close to the app's own scoring).
  function pickWebVoice(preferURI) {
    if (!window.speechSynthesis) return null;
    var vs = window.speechSynthesis.getVoices() || [];
    if (!vs.length) return null;
    if (preferURI) { for (var i=0;i<vs.length;i++) if (vs[i].voiceURI===preferURI) return vs[i]; }
    var en = vs.filter(function(v){ return /^en/i.test(v.lang||""); });
    var pool = en.length ? en : vs;
    pool = pool.slice().sort(function(m,f){
      function sc(v){ var s=0, n=(v.name||"").toLowerCase();
        if(/natural|neural|enhanced|premium/.test(n))s+=40;
        if(/google|microsoft|samantha|aria|jenny|libby/.test(n))s+=25;
        if(/female|woman|samantha|aria|jenny|libby|zira/.test(n))s+=10;
        if(v.localService)s+=5; return s; }
      return sc(f)-sc(m);
    });
    return pool[0] || null;
  }

  function webSpeak(text, opts) {
    try {
      if (!window.speechSynthesis) return false;
      window.speechSynthesis.cancel();
      var u = new SpeechSynthesisUtterance(text);
      u.rate = .9; u.pitch = 1.12; u.volume = 1; u.lang = "en-US";
      var v = (opts && opts.voice) || pickWebVoice(opts && opts.voiceURI);
      if (v) u.voice = v;
      window.speechSynthesis.speak(u);
      return true;
    } catch (e) { return false; }
  }

  var _ttsReady = false, _ttsChecked = false;
  function ensureTTS() {
    if (_ttsChecked) return Promise.resolve(_ttsReady);
    _ttsChecked = true;
    var tts = nativePlugin("TextToSpeech");
    if (!tts || !isNative()) { _ttsReady = false; return Promise.resolve(false); }
    // Some versions expose getSupportedLanguages; just mark ready.
    _ttsReady = true;
    return Promise.resolve(true);
  }

  // Global the main app calls for ALL narration.
  window.LL_speak = function (text, opts) {
    if (!text) return;
    // Prefer native TTS on device — reliable inside Android WebView.
    if (isNative()) {
      ensureTTS().then(function (ok) {
        var tts = nativePlugin("TextToSpeech");
        if (ok && tts && tts.speak) {
          try { tts.stop && tts.stop(); } catch (e) {}
          tts.speak({
            text: String(text), lang: "en-US", rate: 1.0, pitch: 1.15,
            volume: 1.0, category: "playback"
          }).catch(function () { webSpeak(text, opts); });
        } else {
          webSpeak(text, opts);
        }
      });
      return;
    }
    webSpeak(text, opts);
  };

  window.LL_stopSpeak = function () {
    try { var tts = nativePlugin("TextToSpeech"); if (tts && tts.stop) tts.stop(); } catch (e) {}
    try { if (window.speechSynthesis) window.speechSynthesis.cancel(); } catch (e) {}
  };

  /* ========================================================================
     2) PERMISSIONS (microphone) + audio unlock
     ======================================================================== */
  // Warm the audio path on first gesture so WebView releases audio focus.
  (function () {
    var done = false;
    function unlock() {
      if (done) return; done = true;
      try {
        var AC = window.AudioContext || window.webkitAudioContext;
        if (AC) { var ctx = new AC(); if (ctx.resume) ctx.resume(); }
      } catch (e) {}
      try { if (window.speechSynthesis) { var u=new SpeechSynthesisUtterance(" "); u.volume=0; window.speechSynthesis.speak(u); } } catch (e) {}
      window.removeEventListener("touchstart", unlock);
      window.removeEventListener("pointerdown", unlock);
      window.removeEventListener("click", unlock);
    }
    window.addEventListener("touchstart", unlock, { passive:true });
    window.addEventListener("pointerdown", unlock, { passive:true });
    window.addEventListener("click", unlock, { passive:true });
  })();

  function statusGranted(st) {
    if (!st) return false;
    if (st === true) return true;
    // PermissionStatus shapes vary: {speechRecognition:'granted'} / {microphone:'granted'} / {value:...}
    var vals = [];
    try { Object.keys(st).forEach(function (k) { vals.push(st[k]); }); } catch (e) {}
    if (!vals.length) return false;
    // Granted only if none are explicitly denied and at least one says granted/prompt.
    var denied = vals.some(function (v) { return v === "denied"; });
    var okAny = vals.some(function (v) { return v === "granted" || v === "prompt" || v === true; });
    return !denied && okAny;
  }

  window.LL_requestMic = function () {
    // Try Capacitor SpeechRecognition permission first, then getUserMedia.
    var sr = nativePlugin("SpeechRecognition");
    if (isNative() && sr && sr.requestPermissions) {
      return sr.requestPermissions()
        .then(function (st) { return statusGranted(st) ? true : true; }) // resolve => user was asked; treat as usable, listen() will surface real failures
        .catch(function () { return false; });
    }
    if (isNative() && sr && sr.requestPermission) {
      return sr.requestPermission().then(function () { return true; }).catch(function () { return false; });
    }
    if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
      return navigator.mediaDevices.getUserMedia({ audio: true })
        .then(function (stream) { stream.getTracks().forEach(function (t) { t.stop(); }); return true; })
        .catch(function () { return false; });
    }
    return Promise.resolve(false);
  };

  /* One-shot speech-to-text. Resolves with transcript string (or "" on fail). */
  window.LL_listen = function () {
    var sr = nativePlugin("SpeechRecognition");
    if (isNative() && sr && sr.start) {
      return sr.start({ language:"en-US", maxResults:3, prompt:"Speak now", partialResults:false, popup:false })
        .then(function (res) {
          // Result shapes across versions: {matches:[...]} | {value:[...]} | [...] | "text"
          var m = null;
          if (res) {
            if (Array.isArray(res)) m = res;
            else if (res.matches) m = res.matches;
            else if (res.value) m = res.value;
            else if (typeof res === "string") m = [res];
          }
          return (m && m[0]) ? String(m[0]) : "";
        }).catch(function () { return ""; });
    }
    // Web fallback: webkitSpeechRecognition
    return new Promise(function (resolve) {
      var R = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!R) { resolve(""); return; }
      try {
        var r = new R(); r.lang = "en-US"; r.interimResults = false; r.maxAlternatives = 1;
        var got = false;
        r.onresult = function (e) { got = true; resolve(e.results[0][0].transcript || ""); };
        r.onerror = function () { if (!got) resolve(""); };
        r.onend = function () { if (!got) resolve(""); };
        r.start();
      } catch (e) { resolve(""); }
    });
  };

  /* ========================================================================
     3) GROQ KEY storage (parent-entered) + chat call
     ======================================================================== */
  var GROQ_KEY = "littleLearners.groqKey";
  window.LL_getGroqKey = function () { try { return localStorage.getItem(GROQ_KEY) || ""; } catch (e) { return ""; } };
  window.LL_setGroqKey = function (k) { try { k ? localStorage.setItem(GROQ_KEY, k.trim()) : localStorage.removeItem(GROQ_KEY); } catch (e) {} };

  window.LL_groqChat = function (messages) {
    var key = window.LL_getGroqKey();
    if (!key) return Promise.reject(new Error("no-key"));
    return fetch("https://api.groq.com/openai/v1/chat/completions", {
      method: "POST",
      headers: { "Content-Type": "application/json", "Authorization": "Bearer " + key },
      body: JSON.stringify({
        model: "llama-3.1-8b-instant",
        temperature: 0.6,
        max_tokens: 220,
        messages: messages
      })
    }).then(function (r) {
      if (!r.ok) throw new Error("http-" + r.status);
      return r.json();
    }).then(function (d) {
      var c = d && d.choices && d.choices[0] && d.choices[0].message && d.choices[0].message.content;
      return (c || "").trim();
    });
  };

  /* ========================================================================
     4) READING SECTION  ("Read with Me")  — blending / joining words
     ======================================================================== */
  // Curriculum: CVC families + digraphs + sight words, staged easy -> harder.
  var READ = {
    // Letter sounds (phonics) — child taps to hear each sound.
    sounds: [
      {l:"a",say:"a",word:"apple",e:"🍎"},{l:"b",say:"buh",word:"ball",e:"⚽"},
      {l:"c",say:"cuh",word:"cat",e:"🐱"},{l:"d",say:"duh",word:"dog",e:"🐶"},
      {l:"e",say:"eh",word:"egg",e:"🥚"},{l:"f",say:"ff",word:"fish",e:"🐟"},
      {l:"g",say:"guh",word:"goat",e:"🐐"},{l:"h",say:"hh",word:"hat",e:"🎩"},
      {l:"i",say:"ih",word:"igloo",e:"🧊"},{l:"j",say:"juh",word:"jug",e:"🫙"},
      {l:"k",say:"kuh",word:"kite",e:"🪁"},{l:"l",say:"ll",word:"leg",e:"🦵"},
      {l:"m",say:"mm",word:"man",e:"🧍"},{l:"n",say:"nn",word:"net",e:"🥅"},
      {l:"o",say:"o",word:"orange",e:"🍊"},{l:"p",say:"puh",word:"pig",e:"🐷"},
      {l:"r",say:"rr",word:"rat",e:"🐀"},{l:"s",say:"sss",word:"sun",e:"☀️"},
      {l:"t",say:"tuh",word:"top",e:"🔝"},{l:"u",say:"uh",word:"umbrella",e:"☂️"},
      {l:"v",say:"vv",word:"van",e:"🚐"},{l:"w",say:"wuh",word:"web",e:"🕸️"},
      {l:"y",say:"yuh",word:"yak",e:"🐃"},{l:"z",say:"zz",word:"zip",e:"🤐"}
    ],
    // Word families grouped by rime — for "joining sounds into words".
    families: [
      { rime:"at", e:"🐱", words:[
        {w:"cat",p:["c","a","t"],e:"🐱"},{w:"hat",p:["h","a","t"],e:"🎩"},
        {w:"mat",p:["m","a","t"],e:"🟫"},{w:"bat",p:["b","a","t"],e:"🦇"},
        {w:"rat",p:["r","a","t"],e:"🐀"},{w:"sat",p:["s","a","t"],e:"🪑"} ] },
      { rime:"an", e:"🧍", words:[
        {w:"man",p:["m","a","n"],e:"🧍"},{w:"pan",p:["p","a","n"],e:"🍳"},
        {w:"fan",p:["f","a","n"],e:"🌀"},{w:"can",p:["c","a","n"],e:"🥫"},
        {w:"van",p:["v","a","n"],e:"🚐"},{w:"ran",p:["r","a","n"],e:"🏃"} ] },
      { rime:"ig", e:"🐷", words:[
        {w:"pig",p:["p","i","g"],e:"🐷"},{w:"dig",p:["d","i","g"],e:"⛏️"},
        {w:"big",p:["b","i","g"],e:"🔵"},{w:"wig",p:["w","i","g"],e:"👨‍🦰"},
        {w:"fig",p:["f","i","g"],e:"🫐"} ] },
      { rime:"og", e:"🐶", words:[
        {w:"dog",p:["d","o","g"],e:"🐶"},{w:"log",p:["l","o","g"],e:"🪵"},
        {w:"fog",p:["f","o","g"],e:"🌫️"},{w:"hog",p:["h","o","g"],e:"🐗"},
        {w:"jog",p:["j","o","g"],e:"🏃"} ] },
      { rime:"un", e:"☀️", words:[
        {w:"sun",p:["s","u","n"],e:"☀️"},{w:"run",p:["r","u","n"],e:"🏃"},
        {w:"bun",p:["b","u","n"],e:"🍞"},{w:"fun",p:["f","u","n"],e:"🎉"},
        {w:"nun",p:["n","u","n"],e:"👩"} ] },
      { rime:"ed", e:"🛏️", words:[
        {w:"bed",p:["b","e","d"],e:"🛏️"},{w:"red",p:["r","e","d"],e:"🔴"},
        {w:"led",p:["l","e","d"],e:"💡"},{w:"fed",p:["f","e","d"],e:"🍽️"},
        {w:"wed",p:["w","e","d"],e:"💍"} ] }
    ],
    // First sight words (learned as wholes).
    sight: ["the","and","is","a","to","I","go","see","my","we","you","he","she","it","in","on","up","me","like","look"],
    // Two-word joins -> short sentences (word building).
    sentences: [
      {words:["I","see","a","cat"],e:"🐱"},
      {words:["the","dog","is","big"],e:"🐶"},
      {words:["I","can","run"],e:"🏃"},
      {words:["look","at","the","sun"],e:"☀️"},
      {words:["a","pig","and","a","hen"],e:"🐷"},
      {words:["we","go","up"],e:"⬆️"},
      {words:["I","like","my","hat"],e:"🎩"},
      {words:["the","man","has","a","van"],e:"🚐"}
    ]
  };

  function rnd(arr){ return arr[Math.floor(Math.random()*arr.length)]; }
  function shuffle(arr){ arr=arr.slice(); for(var i=arr.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1)); var t=arr[i];arr[i]=arr[j];arr[j]=t;} return arr; }

  // Reading progress persistence (per kid).
  var READ_KEY = "littleLearners.reading";
  function loadReading(){ try { return JSON.parse(localStorage.getItem(READ_KEY))||{}; } catch(e){ return {}; } }
  function saveReading(o){ try { localStorage.setItem(READ_KEY, JSON.stringify(o)); } catch(e){} }

  window.LL_Reading = function (props) {
    var R = window.React, h = R.createElement, b = R.useState, ef = R.useEffect, rf = R.useRef;
    var speak = props.speak || window.LL_speak;
    var kid = props.kid || {short:"friend"};
    var kidIdx = props.kidIndex || 0;

    var scr = b("menu"); var screen = scr[0], setScreen = scr[1];

    function Menu() {
      var tiles = [
        { id:"sounds",  icon:"🔤", label:"Letter Sounds", color:y.clay,     desc:"Hear each letter's sound" },
        { id:"blend",   icon:"🧩", label:"Join the Sounds", color:y.berry,  desc:"Slide sounds together into a word" },
        { id:"build",   icon:"🏗️", label:"Build a Word",   color:y.leaf,    desc:"Put letters in order" },
        { id:"family",  icon:"👨‍👩‍👧", label:"Word Families", color:"#0E9594", desc:"Words that rhyme" },
        { id:"sight",   icon:"👀", label:"Sight Words",     color:"#E0518A", desc:"Quick everyday words" },
        { id:"read",    icon:"📖", label:"Read a Sentence", color:"#3a4a8c", desc:"Join words into a sentence" },
        { id:"say",     icon:"🎤", label:"Say It! (mic)",   color:y.clayDark, desc:"Read out loud to the app" }
      ];
      return h("div",{style:a.card},
        h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center"}},
          h("button",{onClick:props.onBack,style:Object.assign({},a.bigBtn,{background:"#B0A18B",fontSize:16,padding:"8px 14px"})},"← Home"),
          h("h2",{style:Object.assign({},a.title,{margin:0,fontSize:24})},"🔤 Read with Me"),
          h("span",{style:{width:60}})),
        h("p",{style:{textAlign:"center",fontSize:15,color:"#7a6a55",margin:"6px 0 14px"}},
          "Little steps, "+ (kid.short||"friend") +". Tap a game. Take your time. 💛"),
        h("div",{style:{display:"flex",flexDirection:"column",gap:12}},
          tiles.map(function(t){
            return h("button",{key:t.id,onClick:function(){ speak(t.label); setScreen(t.id); },
              style:Object.assign({},a.bigBtn,{background:t.color,height:78,display:"flex",alignItems:"center",gap:16,justifyContent:"flex-start",paddingLeft:22,margin:0})},
              h("span",{style:{fontSize:38}},t.icon),
              h("span",{style:{display:"flex",flexDirection:"column",alignItems:"flex-start"}},
                h("span",{style:{fontSize:20}},t.label),
                h("span",{style:{fontSize:12,opacity:.9,fontWeight:600}},t.desc)));
          })));
    }

    function Header(title){
      return h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center"}},
        h("button",{onClick:function(){ window.LL_stopSpeak&&window.LL_stopSpeak(); setScreen("menu"); },
          style:Object.assign({},a.bigBtn,{background:"#B0A18B",fontSize:16,padding:"8px 14px"})},"← Back"),
        h("h2",{style:Object.assign({},a.title,{margin:0,fontSize:22})},title),
        h("span",{style:{width:56}}));
    }

    /* --- Letter Sounds grid --- */
    function Sounds(){
      return h("div",{style:a.card}, Header("🔤 Letter Sounds"),
        h("p",{style:{textAlign:"center",fontSize:15,color:"#7a6a55"}},"Tap a letter to hear its sound."),
        h("div",{style:{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10,marginTop:8}},
          READ.sounds.map(function(s){
            return h("button",{key:s.l,onClick:function(){ speak(s.say+"... "+s.word); },
              style:Object.assign({},a.bigBtn,{background:y.berry,height:84,margin:0,display:"flex",flexDirection:"column",gap:2})},
              h("span",{style:{fontSize:30,fontWeight:800}},s.l),
              h("span",{style:{fontSize:22}},s.e));
          })));
    }

    /* --- Join the Sounds (blending): tap each sound, then blend --- */
    function Blend(){
      var st = b(function(){ var f=rnd(READ.families); return rnd(f.words); });
      var word=st[0], setWord=st[1];
      var idx=b(-1); var lit=idx[0], setLit=idx[1];
      var timers=rf([]);
      function clear(){ timers.current.forEach(clearTimeout); timers.current=[]; }
      function sayEach(){
        clear(); setLit(-1);
        word.p.forEach(function(p,i){ timers.current.push(setTimeout(function(){ setLit(i); speak(p); }, i*750)); });
        timers.current.push(setTimeout(function(){ setLit(-1); }, word.p.length*750+300));
      }
      function blendIt(){ clear(); setLit(-2); speak(word.w+"!"); setTimeout(function(){ setLit(-1); },900); }
      function next(){ clear(); var f=rnd(READ.families); var w=rnd(f.words); setWord(w); setLit(-1); setTimeout(function(){ speak("New word."); },150); }
      ef(function(){ return clear; },[]);
      return h("div",{style:a.card}, Header("🧩 Join the Sounds"),
        h("div",{style:{textAlign:"center",fontSize:72,margin:"6px 0"}},word.e),
        h("div",{style:{display:"flex",justifyContent:"center",gap:10,margin:"10px 0"}},
          word.p.map(function(p,i){
            return h("button",{key:i,onClick:function(){ setLit(i); speak(p); },
              style:Object.assign({},a.bigBtn,{background:(lit===i||lit===-2)?y.clay:y.leaf,fontSize:40,width:78,height:78,margin:0,transform:lit===i?"scale(1.12)":"scale(1)"})},p);
          })),
        h("div",{style:{textAlign:"center",fontSize:34,fontWeight:800,letterSpacing:2,color:y.clayDark,minHeight:44}},
          lit===-2? word.w.toUpperCase() : word.p.join(" · ")),
        h("div",{style:{display:"flex",justifyContent:"center",gap:10,flexWrap:"wrap",marginTop:12}},
          h("button",{onClick:sayEach,style:Object.assign({},a.bigBtn,{background:y.berry,fontSize:16,padding:"12px 16px",margin:0})},"🔊 Sound each"),

        onDash = /progress/i.test(document.body.innerText) && /Explore depth/i.test(document.body.innerText);
      } catch (e) {}
      var btn = document.getElementById("ll-gear");
      if (onDash && !btn) {
        btn = document.createElement("button");
        btn.id = "ll-gear";
        btn.textContent = "🔑 AI Teacher & Sound";
        btn.style.cssText = "position:fixed;left:50%;transform:translateX(-50%);bottom:16px;z-index:9000;border:none;border-radius:20px;padding:14px 20px;font-weight:800;font-size:15px;color:#fff;background:#3a4a8c;box-shadow:0 6px 18px rgba(0,0,0,0.25);cursor:pointer;font-family:"+FONT+";";
        btn.onclick = window.LL_openParentSettings;
        document.body.appendChild(btn);
      } else if (!onDash && btn) {
        btn.remove();
      }
    }
    setInterval(ensureBtn, 600);
  })();

  console.log("Little Learners enhancements loaded (native:" + isNative() + ")");
})();

for the day."},{scene:"\u{1F64F}",text:"God fed them faithfully every day."}]},{id:"commandments",title:"God's Good Rules",cover:"\u{1F4DC}",pages:[{scene:"\u26F0\uFE0F",text:"Moses climbed up the tall mountain."},{scene:"\u{1F4DC}",text:"God gave ten rules to live well."},{scene:"\u2764\uFE0F",text:"They taught loving God and one another."},{scene:"\u{1F642}",text:"Good rules help everyone live happily."}]},{id:"joshua",title:"The Walls of Jericho",cover:"\u{1F3BA}",pages:[{scene:"\u{1F3D9}\uFE0F",text:"Jericho had tall, strong walls."},{scene:"\u{1F6B6}",text:"God's people marched around it each day."},{scene:"\u{1F3BA}",text:"On the last day they blew their trumpets."},{scene:"\u{1F4A5}",text:"The great walls came tumbling down!"}]},{id:"gideon",title:"Gideon's Small Army",cover:"\u2694\uFE0F",pages:[{scene:"\u{1F61F}",text:"Gideon's enemy was huge and strong."},{scene:"\u{1F465}",text:"God said to use only a few men."},{scene:"\u{1F526}",text:"They surprised them with torches and trumpets."},{scene:"\u{1F389}",text:"God helped the small group win."}]},{id:"samson",title:"Strong Samson",cover:"\u{1F4AA}",pages:[{scene:"\u{1F4AA}",text:"Samson was the strongest of all men."},{scene:"\u{1F487}",text:"His strength was tied to his long hair."},{scene:"\u{1F634}",text:"When it was cut, his strength left him."},{scene:"\u{1F64F}",text:"He prayed, and God gave strength again."}]},{id:"ruth",title:"Ruth's Kindness",cover:"\u{1F33E}",pages:[{scene:"\u{1F475}",text:"Ruth stayed kindly with old Naomi."},{scene:"\u{1F33E}",text:"She gathered leftover grain in the fields."},{scene:"\u{1F91D}",text:"A kind man named Boaz helped her."},{scene:"\u2764\uFE0F",text:"They married and became a happy family."}]},{id:"samuel",title:"God Calls Samuel",cover:"\u{1F6CF}\uFE0F",pages:[{scene:"\u{1F6CF}\uFE0F",text:"Young Samuel was sleeping in the temple."},{scene:"\u{1F5E3}\uFE0F",text:"A voice called his name in the night."},{scene:"\u{1F64F}",text:"He answered, Speak Lord, I am listening."},{scene:"\u{1F442}",text:"Samuel learned to listen to God."}]},{id:"david",title:"David and Goliath",cover:"\u{1FAA8}",pages:[{scene:"\u{1F9CD}",text:"Goliath the giant frightened everyone."},{scene:"\u{1F9D2}\u{1F3FE}",text:"Young David trusted God and was brave."},{scene:"\u{1FAA8}",text:"He chose a smooth stone and his sling."},{scene:"\u{1F3AF}",text:"One throw, and the giant fell down."},{scene:"\u{1F451}",text:"David's courage came from trusting God."}]},{id:"davidking",title:"David the Shepherd King",cover:"\u{1F451}",pages:[{scene:"\u{1F411}",text:"David began as a shepherd boy."},{scene:"\u{1F3B5}",text:"He played the harp and sang to God."},{scene:"\u{1F451}",text:"He grew up to become a good king."},{scene:"\u2764\uFE0F",text:"He loved God with all his heart."}]},{id:"solomon",title:"Wise King Solomon",cover:"\u{1F989}",pages:[{scene:"\u{1F451}",text:"Solomon became king after David."},{scene:"\u{1F64F}",text:"He asked God for wisdom, not riches."},{scene:"\u2696\uFE0F",text:"He settled hard arguments fairly."},{scene:"\u{1F3DB}\uFE0F",text:"He built a beautiful temple for God."}]},{id:"elijah",title:"Elijah and the Ravens",cover:"\u{1F426}\u200D\u2B1B",pages:[{scene:"\u{1F335}",text:"In a dry time there was little food."},{scene:"\u{1F426}\u200D\u2B1B",text:"God sent ravens with bread for Elijah."},{scene:"\u{1F4A7}",text:"A small brook gave him water to drink."},{scene:"\u{1F64F}",text:"God took care of Elijah faithfully."}]},{id:"jonah",title:"Jonah and the Big Fish",cover:"\u{1F40B}",pages:[{scene:"\u{1F6A2}",text:"Jonah tried to run away from God."},{scene:"\u{1F30A}",text:"A great storm shook the boat."},{scene:"\u{1F40B}",text:"A huge fish swallowed Jonah whole."},{scene:"\u{1F64F}",text:"Inside, he prayed and was sorry."},{scene:"\u{1F3D6}\uFE0F",text:"The fish set him safely on land."}]},{id:"daniel",title:"Daniel and the Lions",cover:"\u{1F981}",pages:[{scene:"\u{1F64F}",text:"Daniel prayed to God every day."},{scene:"\u{1F4DC}",text:"A new law forbade praying. He prayed anyway."},{scene:"\u{1F981}",text:"He was thrown into a den of lions."},{scene:"\u{1F607}",text:"God shut the lions' mouths all night."},{scene:"\u{1F305}",text:"By morning Daniel was completely safe."}]},{id:"shadrach",title:"The Fiery Furnace",cover:"\u{1F525}",pages:[{scene:"\u{1F645}",text:"Three friends would not bow to a statue."},{scene:"\u{1F525}",text:"They were thrown into a blazing furnace."},{scene:"\u{1F607}",text:"A shining figure stood with them inside."},{scene:"\u{1F642}",text:"They walked out without a single burn."}]},{id:"esther",title:"Brave Queen Esther",cover:"\u{1F478}",pages:[{scene:"\u{1F478}",text:"Esther became queen in a faraway land."},{scene:"\u{1F61F}",text:"Her people were in great danger."},{scene:"\u{1F64F}",text:"She bravely spoke up to the king."},{scene:"\u{1F389}",text:"Her courage saved all her people."}]},{id:"christmas",title:"The First Christmas",cover:"\u2B50",pages:[{scene:"\u{1FACF}",text:"Mary and Joseph travelled to Bethlehem."},{scene:"\u{1F3DA}\uFE0F",text:"Every inn was full, so they used a stable."},{scene:"\u{1F476}",text:"That night baby Jesus was born."},{scene:"\u2B50",text:"A bright new star shone above."},{scene:"\u{1F411}",text:"Shepherds hurried to see the baby."},{scene:"\u{1F451}",text:"Wise men followed the star with gifts."}]},{id:"jesusboy",title:"Jesus in the Temple",cover:"\u{1F3DB}\uFE0F",pages:[{scene:"\u{1F6B6}",text:"Young Jesus travelled with his family."},{scene:"\u{1F3DB}\uFE0F",text:"He stayed behind in the temple."},{scene:"\u{1F442}",text:"He amazed the teachers with his questions."},{scene:"\u2764\uFE0F",text:"His parents found him safe and learning."}]},{id:"baptism",title:"Jesus Is Baptized",cover:"\u{1F54A}\uFE0F",pages:[{scene:"\u{1F4A7}",text:"John baptized people in the river."},{scene:"\u{1F64F}",text:"Jesus came to be baptized as well."},{scene:"\u{1F54A}\uFE0F",text:"God's Spirit came down like a dove."},{scene:"\u{1F5E3}\uFE0F",text:"God said, This is my beloved Son."}]},{id:"feeding",title:"Loaves and Fishes",cover:"\u{1F35E}\u{1F41F}",pages:[{scene:"\u{1F465}",text:"A huge crowd grew hungry listening to Jesus."},{scene:"\u{1F9D2}",text:"A boy shared five loaves and two fish."},{scene:"\u{1F64F}",text:"Jesus thanked God and broke the bread."},{scene:"\u{1F35E}",text:"Everyone ate until they were full."},{scene:"\u{1F9FA}",text:"There were twelve baskets left over!"}]}]},folk:{name:"Folk Tales",color:"#3FA34D",icon:"\u{1F941}",books:[{id:"tortoiseshell",title:"Why Tortoise Has a Cracked Shell",cover:"\u{1F422}",pages:[{scene:"\u{1F422}",text:"Long ago Tortoise had a smooth, shiny shell."},{scene:"\u{1F426}",text:"The birds were invited to a sky feast."},{scene:"\u{1FAB6}",text:"Clever Tortoise borrowed feathers to fly."},{scene:"\u{1F372}",text:"But he greedily ate all the food."},{scene:"\u{1F4A5}",text:"The birds took their feathers and he fell."}]},{id:"anansi",title:"Anansi and the Wisdom Pot",cover:"\u{1F577}\uFE0F",pages:[{scene:"\u{1F577}\uFE0F",text:"Anansi gathered all wisdom in one pot."},{scene:"\u{1F334}",text:"He tried to hide it atop a tall tree."},{scene:"\u{1F9D7}",text:"Holding it in front made climbing hard."},{scene:"\u{1F466}",text:"His young son gave him wise advice."},{scene:"\u{1F30D}",text:"The pot broke and wisdom spread to all."}]},{id:"hare",title:"The Clever Hare",cover:"\u{1F407}",pages:[{scene:"\u{1F407}",text:"Small Hare was very, very clever."},{scene:"\u{1F406}",text:"Big Leopard wanted to catch him."},{scene:"\u{1F573}\uFE0F",text:"Hare led him round and hid in a hole."},{scene:"\u{1F634}",text:"Tired Leopard gave up and slept."}]},{id:"sunwater",title:"Why Sun Lives in the Sky",cover:"\u2600\uFE0F",pages:[{scene:"\u2600\uFE0F",text:"Sun and Water were the best of friends."},{scene:"\u{1F3E0}",text:"Water came to visit Sun's house."},{scene:"\u{1F30A}",text:"Water rose and filled the whole house."},{scene:"\u2601\uFE0F",text:"Sun climbed high into the sky to stay dry."}]},{id:"drum",title:"The Magic Drum",cover:"\u{1F941}",pages:[{scene:"\u{1F941}",text:"A hunter found a drum that gave food."},{scene:"\u{1F372}",text:"He shared its feasts with everyone."},{scene:"\u{1F60B}",text:"A greedy neighbour borrowed it selfishly."},{scene:"\u{1F4A2}",text:"Used greedily, it brought only trouble."}]},{id:"lion-mouse",title:"The Lion and the Mouse",cover:"\u{1F981}",pages:[{scene:"\u{1F981}",text:"A great lion caught a tiny mouse."},{scene:"\u{1F42D}",text:"The mouse promised to help one day."},{scene:"\u{1FAA2}",text:"Later the lion was caught in a net."},{scene:"\u{1F42D}",text:"The little mouse chewed the net and freed him."}]},{id:"ant-grasshopper",title:"The Ant and the Grasshopper",cover:"\u{1F41C}",pages:[{scene:"\u{1F41C}",text:"The ant worked hard storing food."},{scene:"\u{1F997}",text:"The grasshopper just played all summer."},{scene:"\u2744\uFE0F",text:"When cold winter came, food was scarce."},{scene:"\u{1F372}",text:"The wise ant had plenty stored away."}]},{id:"crow",title:"The Clever Crow",cover:"\u{1F426}\u200D\u2B1B",pages:[{scene:"\u{1F426}\u200D\u2B1B",text:"A thirsty crow found a jug of water."},{scene:"\u{1F6B0}",text:"The water was too low to reach."},{scene:"\u{1FAA8}",text:"He dropped in pebbles one by one."},{scene:"\u{1F4A7}",text:"The water rose and he drank happily."}]},{id:"spider-web",title:"How Spider Got a Thin Waist",cover:"\u{1F578}\uFE0F",pages:[{scene:"\u{1F577}\uFE0F",text:"Spider loved feasts more than anything."},{scene:"\u{1F389}",text:"Two villages held feasts on the same day."},{scene:"\u{1FAA2}",text:"He tied a rope to each, around his middle."},{scene:"\u{1F62C}",text:"Both pulled, and his waist became thin."}]},{id:"elephant-rain",title:"Why Elephant Has a Trunk",cover:"\u{1F418}",pages:[{scene:"\u{1F418}",text:"Long ago Elephant had a small nose."},{scene:"\u{1F40A}",text:"A crocodile grabbed his nose by the river."},{scene:"\u{1F4AA}",text:"They tugged and tugged for a long time."},{scene:"\u{1F418}",text:"His nose stretched into a long trunk."}]},{id:"monkey-drum",title:"Monkey's Drum",cover:"\u{1F412}",pages:[{scene:"\u{1F412}",text:"Monkey had a drum the animals loved."},{scene:"\u{1F3B6}",text:"Everyone danced when he played."},{scene:"\u{1F60F}",text:"He teased and would not share it."},{scene:"\u{1F91D}",text:"In the end he learned to share the fun."}]},{id:"star-child",title:"The Star Child",cover:"\u{1F31F}",pages:[{scene:"\u{1F31F}",text:"A little star fell from the sky."},{scene:"\u{1F467}",text:"A kind girl helped it shine again."},{scene:"\u2728",text:"It glowed and thanked her brightly."},{scene:"\u{1F30C}",text:"It flew home and twinkled just for her."}]},{id:"wise-owl",title:"The Wise Old Owl",cover:"\u{1F989}",pages:[{scene:"\u{1F989}",text:"An old owl was known for being wise."},{scene:"\u{1F5E3}\uFE0F",text:"The more he heard, the less he spoke."},{scene:"\u{1F442}",text:"He spoke little but said wise things."},{scene:"\u{1F642}",text:"The animals learned that listening is wise."}]},{id:"frog-rain",title:"The Frog Who Called the Rain",cover:"\u{1F438}",pages:[{scene:"\u{1F438}",text:"A little frog loved the rain."},{scene:"\u2600\uFE0F",text:"But the land was dry and thirsty."},{scene:"\u{1F3B5}",text:"He sang a hopeful song for rain."},{scene:"\u{1F327}\uFE0F",text:"At last the rain came pouring down."}]},{id:"greedy-dog",title:"The Dog and His Bone",cover:"\u{1F415}",pages:[{scene:"\u{1F415}",text:"A dog carried a tasty bone home."},{scene:"\u{1F4A7}",text:"He saw himself in the water."},{scene:"\u{1F62E}",text:"He wanted the other dog's bone too."},{scene:"\u{1F4A6}",text:"He barked and lost his own bone."}]},{id:"kindness-bird",title:"The Bird and the Kind Boy",cover:"\u{1F426}",pages:[{scene:"\u{1F426}",text:"A small bird hurt its wing."},{scene:"\u{1F9D2}",text:"A gentle boy helped it heal."},{scene:"\u{1F33E}",text:"Soon the bird flew off, strong again."},{scene:"\u{1F381}",text:"It returned with seeds of a magic plant."}]},{id:"two-goats",title:"The Two Stubborn Goats",cover:"\u{1F410}",pages:[{scene:"\u{1F410}",text:"Two goats met on a narrow bridge."},{scene:"\u{1F624}",text:"Neither would step aside for the other."},{scene:"\u{1F4A5}",text:"They pushed and both nearly fell in!"},{scene:"\u{1F91D}",text:"They learned to take turns and cross safely."}]},{id:"clever-girl",title:"The Clever Little Girl",cover:"\u{1F467}",pages:[{scene:"\u{1F467}",text:"A clever girl solved hard riddles."},{scene:"\u{1F914}",text:"The chief had a puzzle no one could solve."},{scene:"\u{1F4A1}",text:"She thought hard and found the answer."},{scene:"\u{1F389}",text:"The whole village cheered for her."}]},{id:"moon-water",title:"Why Moon Shines on Water",cover:"\u{1F319}",pages:[{scene:"\u{1F319}",text:"The Moon loved to watch the river."},{scene:"\u{1F4A7}",text:"The river shone her light back up."},{scene:"\u{1F91D}",text:"They became gentle nighttime friends."},{scene:"\u2728",text:"That is why Moon still shines on water."}]},{id:"brave-chick",title:"The Brave Little Chick",cover:"\u{1F424}",pages:[{scene:"\u{1F424}",text:"The smallest chick felt very tiny."},{scene:"\u{1F985}",text:"A hawk circled over the farmyard."},{scene:"\u{1F4E3}",text:"She bravely warned all the other chicks."},{scene:"\u{1F6E1}\uFE0F",text:"Thanks to her, everyone stayed safe."}]}]},world:{name:"Around the World",color:"#E8743B",icon:"\u{1F30D}",books:[{id:"pigs",title:"The Three Little Pigs",cover:"\u{1F437}",pages:[{scene:"\u{1F437}",text:"Three little pigs built houses of their own."},{scene:"\u{1F33E}\u{1FAB5}\u{1F9F1}",text:"One used straw, one sticks, one strong bricks."},{scene:"\u{1F43A}",text:"The wolf blew the weak houses down."},{scene:"\u{1F9F1}",text:"But the brick house stood firm and safe."}]},{id:"tortoise-hare",title:"The Tortoise and the Hare",cover:"\u{1F3C1}",pages:[{scene:"\u{1F407}\u{1F422}",text:"Speedy Hare laughed at slow Tortoise."},{scene:"\u{1F634}",text:"Sure he'd win, Hare stopped for a nap."},{scene:"\u{1F422 l a helpful friend at night?"]},{e:"\u{1F99C}",name:"Parrot",art:"parrot",layers:["This is a parrot. It has bright feathers.","The grey parrot is very clever and can copy words and sounds it hears.","Parrots use strong curved beaks to crack hard nuts. What other jobs could that beak do?"]},{e:"\u{1F41F}",name:"Fish",art:"fish",layers:["This is a fish. It swims in the water.","Fish breathe underwater using gills, and they swish their tails to swim.","Fish have fins all over. Why do you think different fins help a fish turn, stop, and go?"]}]},body:{name:"My Body",icon:"\u{1F9D2}\u{1F3FE}",color:"#6C4AB6",topics:[{e:"\u{1F440}",name:"Eyes",layers:["These are your eyes. You see with them.","Your two eyes work together so you can tell what is near and what is far.","Why do we blink? Blinking keeps your eyes clean and wet, like tiny windscreen wipers."]},{e:"\u{1F442}",name:"Ears",layers:["These are your ears. You hear with them.","Your ears catch sounds from all around, even behind you.","Why do you have an ear on each side of your head? It helps you tell where a sound comes from."]},{e:"\u270B",name:"Hands",layers:["These are your hands. You hold things with them.","Your thumb can touch every finger, which lets you grip and pick up tiny things.","Why are hands so useful? Think of all the things only hands can do \u2014 clap, write, button a shirt."]},{e:"\u{1F9B7}",name:"Teeth",layers:["These are your teeth. You chew food with them.","Front teeth bite and back teeth grind your food into tiny bits.","Why should we brush our teeth every day? To wash away sugar so teeth stay strong."]},{e:"\u2764\uFE0F",name:"Heart",layers:["This is your heart. It goes thump thump.","Your heart pumps blood all around your body, day and night.","When you run fast your heart beats quicker. Why do you think it speeds up?"]}]},nature:{name:"Nature",icon:"\u{1F333}",color:"#3FA34D",topics:[{e:"\u2600\uFE0F",name:"Sun",art:"sun",layers:["This is the sun. It is bright and warm.","The sun gives u
